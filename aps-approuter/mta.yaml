_schema-version: "3.1"
ID: aps-approuter
version: 1.2.0

modules:
  - name: aps-approuter
    type: nodejs
    path: approuter
    parameters:
      disk-quota: 256M
      memory: 256M
    requires:
      - name: XSUAA-application-APSAppRouter
      - name: HTML5-app_runtime-APSAppRouter
      - name: DEST-lite-APSAppRouter

resources:
  - name: XSUAA-application-APSAppRouter
    type: org.cloudfoundry.existing-service

  - name: HTML5-app_runtime-APSAppRouter        # app-runtime, not app-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime                 # ← serves content; each app has its own app-host

  - name: DEST-lite-APSAppRouter
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
