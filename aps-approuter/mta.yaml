_schema-version: "3.1"
ID: aps-approuter
version: 1.0.1

modules:
  - name: aps-approuter
    type: nodejs
    path: approuter
    parameters:
      disk-quota: 256M
      memory: 256M
    requires:
      - name: aps-approuter-xsuaa
      - name: aps-approuter-html5-apps-repo-rt
      - name: aps-approuter-destination

resources:
  - name: aps-approuter-xsuaa
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: aps-uaa

  - name: aps-approuter-html5-apps-repo-rt   # app-runtime, not app-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime              # ← serves content; each app has its own app-host

  - name: aps-approuter-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
